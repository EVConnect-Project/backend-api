version: '3.8'

networks:
  evconnect_net:
    driver: bridge

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: evconnect
      POSTGRES_PASSWORD: evconnect_pass
      POSTGRES_DB: evconnect
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evconnect"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - evconnect_net

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "900", "1"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - evconnect_net

  evconnect_backend:
    build:
      context: ../evconnect_backend
      dockerfile: Dockerfile
    env_file:
      - ../evconnect_backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - '4000:4000'
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - evconnect_net

  evconnect_ai:
    build:
      context: ../ai-services
      dockerfile: Dockerfile
    env_file:
      - ../ai-services/.env
    ports:
      - '5000:5000'
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - evconnect_net

  nginx:
    image: nginx:stable-alpine
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certs:/etc/letsencrypt:ro
    depends_on:
      - evconnect_backend
      - evconnect_ai
    networks:
      - evconnect_net

volumes:
  postgres_data:
  redis_data:
