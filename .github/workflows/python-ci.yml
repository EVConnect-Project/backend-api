name: Python AI Services CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'ai-services/**'
      - '.github/workflows/python-ci.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'ai-services/**'
      - '.github/workflows/python-ci.yml'

jobs:
  build-and-test:
    name: Build and Test AI Services
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ai-services
    
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      - name: Verify Python installation
        run: |
          python --version
          pip --version
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install flake8 black mypy pytest-cov
      
      - name: Run Black formatter check
        run: black --check .
        continue-on-error: true
      
      - name: Run Flake8 linter
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        continue-on-error: true
      
      - name: Run type checking with mypy
        run: mypy main.py train_model.py --ignore-missing-imports
        continue-on-error: true
      
      - name: Train ML model
        run: python train_model.py
      
      - name: Run pytest
        run: pytest test_api.py -v --cov=. --cov-report=xml --cov-report=term
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ai-services/coverage.xml
          flags: python
          name: python-coverage
        if: always()
      
      - name: Test server startup
        run: |
          timeout 10s uvicorn main:app --host 0.0.0.0 --port 5000 &
          sleep 5
          curl -f http://localhost:5000/health || exit 1
        continue-on-error: true
      
      - name: Archive ML models
        uses: actions/upload-artifact@v4
        with:
          name: ml-models-python-${{ matrix.python-version }}
          path: ai-services/models/
          retention-days: 7
        if: success()
