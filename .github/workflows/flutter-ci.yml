name: Flutter CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'mobile-app/evconnect_app/**'
      - '.github/workflows/flutter-ci.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'mobile-app/evconnect_app/**'
      - '.github/workflows/flutter-ci.yml'

jobs:
  build-and-test:
    name: Build and Test Flutter App
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: mobile-app/evconnect_app
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true
      
      - name: Verify Flutter installation
        run: flutter --version
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Verify dependencies
        run: flutter pub outdated || true
      
      - name: Run Flutter analyze
        run: flutter analyze
      
      - name: Run Flutter tests
        run: flutter test --coverage
      
      - name: Check formatting
        run: dart format --set-exit-if-changed .
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: mobile-app/evconnect_app/coverage/lcov.info
          flags: flutter
          name: flutter-coverage
        if: always()
      
      - name: Build APK (Android)
        run: flutter build apk --debug
        if: success()
      
      - name: Build Web
        run: flutter build web --release
        if: success()
      
      - name: Archive build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flutter-build-artifacts
          path: |
            mobile-app/evconnect_app/build/app/outputs/flutter-apk/
            mobile-app/evconnect_app/build/web/
          retention-days: 7
        if: success()
