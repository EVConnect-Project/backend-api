name: Node.js CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'backend-api/evconnect_backend/**'
      - '.github/workflows/node-ci.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'backend-api/evconnect_backend/**'
      - '.github/workflows/node-ci.yml'

jobs:
  build-and-test:
    name: Build and Test NestJS Backend
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: backend-api/evconnect_backend
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: evconnect_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: backend-api/evconnect_backend/package-lock.json
      
      - name: Verify Node.js installation
        run: |
          node --version
          npm --version
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run ESLint
        run: npm run lint
      
      - name: Run TypeScript check
        run: npx tsc --noEmit
      
      - name: Run unit tests
        run: npm run test
        env:
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_USER: testuser
          DATABASE_PASSWORD: testpass
          DATABASE_NAME: evconnect_test
          JWT_SECRET: test-secret-key
          JWT_REFRESH_SECRET: test-refresh-secret-key
      
      - name: Run e2e tests
        run: npm run test:e2e
        env:
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_USER: testuser
          DATABASE_PASSWORD: testpass
          DATABASE_NAME: evconnect_test
          JWT_SECRET: test-secret-key
          JWT_REFRESH_SECRET: test-refresh-secret-key
      
      - name: Run test coverage
        run: npm run test:cov
        env:
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_USER: testuser
          DATABASE_PASSWORD: testpass
          DATABASE_NAME: evconnect_test
          JWT_SECRET: test-secret-key
          JWT_REFRESH_SECRET: test-refresh-secret-key
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: backend-api/evconnect_backend/coverage/lcov.info
          flags: nestjs
          name: nestjs-coverage
        if: always()
      
      - name: Build application
        run: npm run build
      
      - name: Archive build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nestjs-build-${{ matrix.node-version }}
          path: backend-api/evconnect_backend/dist/
          retention-days: 7
        if: success()
